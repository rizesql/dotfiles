# # ~/.config/starship.toml

# # Inserts a blank line between shell prompts
# add_newline = true

# # Change command timeout from 500 to 1000 ms
# command_timeout = 1000

# # new config
# format = """$env_var $all"""

# Change the default prompt characters
[character]
success_symbol = ""
error_symbol = ""

disabled = false

# Shows the username
[username]
style_user = "bold blue"
style_root = "white"
format = "[$user]($style) "
disabled = false
show_always = true

[hostname]
ssh_only = true
ssh_symbol = "¯¼ü "
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 1
home_symbol = "´ôó  ~"
read_only_style = "197"
read_only = " ´Çú "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "¾░èó "
format = "via [$symbol$branch]($style) "
# truncation_length = 4
style = "#ff9800"
disabled = false

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "­şÅ│"
up_to_date = "´üå "
untracked = "´ö® "
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
stashed = "´úû "
modified = "´üä "
staged = '[++\($count\)](green)'
renamed = "´¬Â "
deleted = "´Çö "
disabled = true

[git_metrics]
disabled = false
added_style = "green"
deleted_style = "red"
format = "([+$added]($added_style))( [-$deleted]($deleted_style) )"

