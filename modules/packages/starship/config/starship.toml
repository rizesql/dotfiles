[fill]
symbol = ' '

# Change the default prompt characters
[character]
success_symbol = ""
error_symbol = ""

disabled = false

# Shows the username
[username]
style_user = "bold blue"
style_root = "white"
format = "[$user ]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = true
ssh_symbol = "î¬پ "
format = "on [$hostname](bold yellow) "
disabled = false

[directory]
truncation_length = 1
home_symbol = "ï“¢  ~"
read_only_style = "197"
read_only = " ï€£ "
format = "at [$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = "َ°ٹ¢ "
format = "on [$symbol$branch]($style) "
# truncation_length = 4
style = "#ff9800"
disabled = false

[git_status]
format = '[\($all_status$ahead_behind\)]($style) '
style = "bold green"
conflicted = "ًںڈ³"
